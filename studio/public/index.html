<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Provenfolio Studio</title>
  <link rel="stylesheet" href="/theme.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header id="owner-name">Studio</header>
      <div id="lists">
        <section>
          <h2 data-i18n="sidebarProjects">Projects</h2>
          <ul id="project-list"></ul>
        </section>
        <section>
          <h2 data-i18n="sidebarPendingIntakes">Pending intakes</h2>
          <ul id="intake-list"></ul>
        </section>
      </div>
      <div id="sidebar-actions">
        <button id="btn-add-repo" type="button" data-i18n="btnAddRepo">+ Add repository</button>
        <button id="btn-add-manual" type="button" data-i18n="btnAddManual">+ Manual project</button>
        <button id="btn-design" type="button" data-i18n="btnDesign">Site design</button>
        <button id="btn-analyze" type="button" class="accent" data-i18n="btnAnalyze">▶ Run analysis (/analyze --pending)</button>
      </div>
    </aside>
    <main id="main">
      <div id="main-empty" data-i18n="mainEmpty">Select a project from the list on the left</div>
      <div id="main-content" hidden>
        <header id="main-header">
          <h1 id="main-title"></h1>
          <nav id="tabs"></nav>
        </header>
        <div id="tab-body"></div>
      </div>
    </main>
  </div>
  <div id="drawer" hidden>
    <div id="drawer-bar">
      <span data-i18n="analyzeLogTitle">Analysis log</span>
      <button id="drawer-close" type="button">×</button>
    </div>
    <pre id="analyze-log"></pre>
  </div>
  <div id="toast" hidden></div>
  <script src="/i18n.js"></script>
  <script src="/app.js"></script>
</body>
</html>
