<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Provenfolio Studio</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header id="owner-name">Studio</header>
      <div id="lists">
        <section>
          <h2>プロジェクト</h2>
          <ul id="project-list"></ul>
        </section>
        <section>
          <h2>保留インテーク</h2>
          <ul id="intake-list"></ul>
        </section>
      </div>
      <div id="sidebar-actions">
        <button id="btn-add-repo" type="button">+ リポジトリ追加</button>
        <button id="btn-add-manual" type="button">+ 手動プロジェクト</button>
        <button id="btn-analyze" type="button" class="accent">▶ 分析実行 (/analyze --pending)</button>
      </div>
    </aside>
    <main id="main">
      <div id="main-empty">左のリストからプロジェクトを選択してください</div>
      <div id="main-content" hidden>
        <header id="main-header">
          <h1 id="main-title"></h1>
          <nav id="tabs"></nav>
        </header>
        <div id="tab-body"></div>
      </div>
    </main>
  </div>
  <div id="drawer" hidden>
    <div id="drawer-bar">
      <span>分析ログ</span>
      <button id="drawer-close" type="button">×</button>
    </div>
    <pre id="analyze-log"></pre>
  </div>
  <div id="toast" hidden></div>
  <script src="/app.js"></script>
</body>
</html>
