# Product-repo guard: data/ belongs to instances, never to the distribution repo.
#
# The distribution repo must contain ZERO tracked data/ paths. A blank seed is
# bootstrapped on demand by engine/scripts/ensure-data.ts (wired into
# `npm run validate`), so nothing under data/ ever needs to be committed here —
# not even for schema migrations (those change seed CODE, not tracked files).
# This is a state check, not a diff check: it inspects what HEAD tracks, so it
# has no bypass and survives any history shape.
#
# Runs ONLY on the canonical distribution repo (the `if:` below); owner
# instances and buyer copies commit their own data/ freely and never trigger it.
name: data-guard

on:
  push:
    branches: [main]
  pull_request:

jobs:
  no-instance-data:
    if: github.repository == 'nel-neru/provenfolio'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if any data/ path is tracked
        run: |
          TRACKED=$(git ls-files -- data/)
          if [ -n "$TRACKED" ]; then
            echo "::error::The distribution repo must contain zero tracked data/ paths (instance data lives only in private instance repos):"
            echo "$TRACKED"
            exit 1
          fi
          echo "no tracked data/ paths — OK."
