# The self-updating loop: refresh metrics from your repos (zero AI cost),
# rebuild, and deploy to Cloudflare Pages — weekly and on demand.
#
# SETUP (one-time, documented in engine/docs/GETTING-STARTED.md):
#   1. Repo secrets: CLOUDFLARE_API_TOKEN (Pages:Edit), CLOUDFLARE_ACCOUNT_ID.
#      Optional: GH_TOKEN with repo read scope if you analyze private repos.
#   2. Repo variable: CF_PAGES_PROJECT (your Pages project name).
#   3. Enable the workflow. Disable anytime — /publish still works manually.
#
# This workflow is for INSTANCE repos: the job is skipped on the canonical
# distribution repo, which tracks no data/ to refresh or commit.
name: refresh

on:
  schedule:
    - cron: "0 21 * * 5" # weekly, Friday 21:00 UTC — adjust to your preferred schedule
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    if: github.repository != 'nel-neru/provenfolio'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Refresh metrics from source repos
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: npm run refresh

      - name: Validate & build
        run: npm run build

      - name: Commit refreshed data
        run: |
          git config user.name "provenfolio-refresh[bot]"
          git config user.email "provenfolio-refresh@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore(refresh): automated metrics refresh"
          git push

      - name: Deploy to Cloudflare Pages
        if: ${{ vars.CF_PAGES_PROJECT != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy site/dist --project-name "${{ vars.CF_PAGES_PROJECT }}"
